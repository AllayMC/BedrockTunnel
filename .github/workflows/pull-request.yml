name: Pull Request Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  jar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew --no-daemon build shadowJar

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BedrockTunnel-pr-jar-${{ github.event.pull_request.number }}
          path: build/libs/BedrockTunnel.jar
          if-no-files-found: error

  windows-package:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Package Windows app image
        run: .\gradlew.bat --no-daemon packageAppImage

      - name: Archive Windows app image
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build\distributions | Out-Null
          Compress-Archive `
            -Path build\packaging\app-image\BedrockTunnel `
            -DestinationPath build\distributions\BedrockTunnel-pr-${{ github.event.pull_request.number }}-windows.zip

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v4
        with:
          name: BedrockTunnel-pr-windows-${{ github.event.pull_request.number }}
          path: build/distributions/BedrockTunnel-pr-${{ github.event.pull_request.number }}-windows.zip
          if-no-files-found: error
