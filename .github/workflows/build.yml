name: Build

on:
  workflow_dispatch:
  push:
    tags-ignore:
      - '**'
    branches:
      - '**'

permissions:
  contents: write

jobs:
  jar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew --no-daemon build shadowJar

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BedrockTunnel-jar-${{ github.sha }}
          path: build/libs/BedrockTunnel.jar
          if-no-files-found: error

  windows-package:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Package Windows app image
        run: .\gradlew.bat --no-daemon packageAppImage

      - name: Archive Windows app image
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build\distributions | Out-Null
          Compress-Archive `
            -Path build\packaging\app-image\BedrockTunnel `
            -DestinationPath build\distributions\BedrockTunnel-windows-${{ github.sha }}.zip

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v4
        with:
          name: BedrockTunnel-windows-${{ github.sha }}
          path: build/distributions/BedrockTunnel-windows-${{ github.sha }}.zip
          if-no-files-found: error

  nightly:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs:
      - jar
      - windows-package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: BedrockTunnel-jar-${{ github.sha }}
          path: release-assets/jar

      - name: Download Windows package artifact
        uses: actions/download-artifact@v4
        with:
          name: BedrockTunnel-windows-${{ github.sha }}
          path: release-assets/windows

      - name: Move nightly tag to current commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa nightly "${GITHUB_SHA}" -m "Nightly build"
          git push origin refs/tags/nightly --force

      - name: Publish nightly prerelease
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: release-assets/jar/BedrockTunnel.jar,release-assets/windows/BedrockTunnel-windows-${{ github.sha }}.zip
          body: |
            Automated nightly build from `${{ github.sha }}`.
          name: Nightly Build
          removeArtifacts: true
          replacesArtifacts: true
          tag: nightly
