name: Build

on:
  workflow_dispatch:
  push:
    tags-ignore:
      - '**'
    branches:
      - '**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew --no-daemon build shadowJar

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BedrockTunnel-${{ github.sha }}
          path: build/libs/BedrockTunnel.jar
          if-no-files-found: error

      - name: Move nightly tag to current commit
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa nightly "${GITHUB_SHA}" -m "Nightly build"
          git push origin refs/tags/nightly --force

      - name: Publish nightly prerelease
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: build/libs/BedrockTunnel.jar
          body: |
            Automated nightly build from `${{ github.sha }}`.
          name: Nightly Build
          removeArtifacts: true
          replacesArtifacts: true
          tag: nightly
